services:
  postgres:
    image: postgres:16-alpine
    container_name: bi-postgres
    environment:
      POSTGRES_USER: bi_user
      POSTGRES_PASSWORD: bi_password
      POSTGRES_DB: bi_manager
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bi_user -d bi_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bi-manager:
    build: .
    container_name: bi-manager
    image: bi-manager:v0.2
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://bi_user:bi_password@postgres:5432/bi_manager
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
    name: bi-postgres-data
